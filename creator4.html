<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LitHub - 진짜 API가 연결된 스터디 라운지</title>
    <style>
        /* 이전과 동일한 디자인 스타일 */
        body { font-family: 'Georgia', serif; background-color: #f4f1ea; color: #333; margin: 0; display: flex; height: 100vh; }
        header { position: absolute; top: 0; width: 100%; background-color: #2c3e50; color: white; padding: 15px 30px; font-size: 24px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .main-content { flex: 7; padding: 80px 40px 40px; overflow-y: auto; }
        .sidebar { flex: 3; background-color: #ffffff; border-left: 2px solid #ddd; padding: 80px 30px 40px; box-shadow: -2px 0 5px rgba(0,0,0,0.05); }
        h2 { border-bottom: 2px solid #2c3e50; padding-bottom: 5px; }
        input[type="text"] { width: 60%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 15px; font-size: 16px; background-color: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #1a252f; }
        .book-info { background-color: white; padding: 20px; border-radius: 8px; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: none; }
        .dictionary-result { margin-top: 20px; padding: 15px; background-color: #f9f9f9; border-left: 4px solid #e74c3c; font-size: 14px; line-height: 1.6;}
        .loading { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

    <header>📚 LitHub: API 연동 버전</header>

    <div class="main-content">
        <h2>구글 북스(Google Books) 검색</h2>
        <input type="text" id="bookSearch" placeholder="진짜 책 제목을 검색해보세요! (예: 1984, Hamlet)">
        <button onclick="searchBookAPI()">구글에서 찾기</button>

        <div id="bookLoading" class="loading" style="display:none;">구글 책 창고를 뒤지는 중... 🏃‍♂️</div>

        <div class="book-info" id="bookResult">
            <h3 id="bookTitle"></h3>
            <p><strong>저자:</strong> <span id="bookAuthor"></span></p>
            <h4>📖 구글 북스 제공 줄거리/설명</h4>
            <p id="bookPlot"></p>
        </div>
    </div>

    <div class="sidebar">
        <h2>실시간 영영 사전</h2>
        <p>어려운 원서 단어를 검색하세요.</p>
        <input type="text" id="wordSearch" placeholder="단어 입력 (예: absolute)">
        <button onclick="searchWordAPI()">뜻 찾기</button>

        <div id="wordLoading" class="loading" style="display:none;">사전 펴는 중... 📖</div>
        <div id="dictResult"></div>
    </div>

    <script>
        // 1. 구글 북스 API 호출 함수
        async function searchBookAPI() {
            const input = document.getElementById('bookSearch').value.trim();
            if (!input) return alert("검색어를 입력해주세요!");

            const resultBox = document.getElementById('bookResult');
            const loadingBox = document.getElementById('bookLoading');
            
            resultBox.style.display = 'none';
            loadingBox.style.display = 'block'; // 로딩 메시지 켜기

            try {
                // 구글 북스 API에 데이터 요청 (fetch)
                const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${input}`);
                const data = await response.json();

                loadingBox.style.display = 'none'; // 로딩 메시지 끄기

                if (data.items && data.items.length > 0) {
                    const firstBook = data.items[0].volumeInfo; // 가장 정확도 높은 첫 번째 책 정보
                    
                    document.getElementById('bookTitle').innerText = firstBook.title || "제목 없음";
                    document.getElementById('bookAuthor').innerText = firstBook.authors ? firstBook.authors.join(", ") : "저자 미상";
                    document.getElementById('bookPlot').innerText = firstBook.description || "이 책은 구글 북스에 줄거리 요약이 제공되지 않습니다.";
                    
                    resultBox.style.display = 'block'; 
                } else {
                    alert("구글 북스에 해당 검색어와 일치하는 책이 없습니다.");
                }
            } catch (error) {
                alert("책 정보를 불러오는 중 에러가 발생했습니다.");
                loadingBox.style.display = 'none';
            }
        }

        // 2. 오픈 영영 사전 API 호출 함수
        async function searchWordAPI() {
            const input = document.getElementById('wordSearch').value.trim();
            if (!input) return alert("단어를 입력해주세요!");

            const resultBox = document.getElementById('dictResult');
            const loadingBox = document.getElementById('wordLoading');

            resultBox.innerHTML = '';
            loadingBox.style.display = 'block'; // 로딩 메시지 켜기

            try {
                // Free Dictionary API에 데이터 요청 (fetch)
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${input}`);
                const data = await response.json();

                loadingBox.style.display = 'none'; // 로딩 메시지 끄기

                if (Array.isArray(data)) {
                    // API가 성공적으로 단어 뜻을 찾아 배열로 돌려줬을 때
                    const wordData = data[0];
                    const definition = wordData.meanings[0].definitions[0].definition; // 첫 번째 뜻 추출
                    
                    resultBox.innerHTML = `
                        <div class="dictionary-result">
                            <strong style="font-size:18px;">${wordData.word}</strong><br><br>
                            <em>Definition:</em> ${definition}
                        </div>
                    `;
                } else {
                    // 단어를 못 찾았을 때
                    resultBox.innerHTML = `<div class="dictionary-result" style="border-color:#7f8c8d;"><strong>${input}</strong><br>사전 API에서 단어를 찾지 못했습니다. 스펠링을 확인해 주세요!</div>`;
                }
            } catch (error) {
                resultBox.innerHTML = `<div class="dictionary-result">사전 서버와 연결할 수 없습니다.</div>`;
                loadingBox.style.display = 'none';
            }
        }
    </script>

</body>
</html>
